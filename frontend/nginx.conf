server {
    listen 80;
    server_name _;

    # SPA — every unknown path falls through to index.html so React Router works.
    root /usr/share/nginx/html;
    index index.html;

    # Small caches for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store" always;
    }

    # Health probe used by Traefik + deploy.sh
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
